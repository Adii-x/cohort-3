<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pikachu</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section class="left">
        <div class="logo">
          <img src="./logo.png" alt="Pokemon Logo" />
        </div>
        <div class="content">
          <h4>POKEMON GEN l</h4>
          <h1>Pikachu</h1>
          <p>
            Pikachu is an Electric-type Pokémon introduced <br />
            in Generation I. Pikachu are small, chubby, <br />
            and incredibly cute mouse-like Pokémon. <br />
            They are almost completely covered by <br />
            yellow fur.
          </p>
          <p id="lastElem">&mdash; 01/08</p>
          <div class="pokeball-img">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#e0b10c"
              stroke-linecap="round"
              stroke-linejoin="round"
              id="Pokeball--Streamline-Tabler"
              height="250"
              width="250"
            >
              <desc>Pokeball Streamline Icon: https://streamlinehq.com</desc>
              <path
                d="M3 12a9 9 0 1 0 18 0 9 9 0 1 0 -18 0"
                stroke-width="2"
              ></path>
              <path
                d="M9 12a3 3 0 1 0 6 0 3 3 0 1 0 -6 0"
                stroke-width="2"
              ></path>
              <path d="M3 12h6" stroke-width="2"></path>
              <path d="M15 12h6" stroke-width="2"></path>
            </svg>
          </div>
        </div>
      </section>
      <section class="right">
        <div class="nav-grid">
            <i class="ri-menu-fill"></i>
        </div>
        <div class="decoration">
            <i class="ri-circle-fill"></i>
            <i class="ri-circle-fill"></i>
            <i class="ri-circle-fill"></i>
            <i class="ri-circle-fill"></i>
            <i class="ri-circle-fill"></i>
        </div>
      </section>
      <div class="pikaImg">
        <img src="./Pikachu.png" alt="Pikachu Image">
      </div>
    </main>
  </body>
</html>
