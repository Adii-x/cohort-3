<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTrack Pro | Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="background-circle circle1"></div>
    <div class="background-circle circle2"></div>

    <div class="login-container">
      <h1>Welcome Back 👋</h1>

      <p class="subtitle">Sign in to continue managing your finances.</p>

      <form id="login">
        <div class="input-group">
          <label>Username</label>
          <input id="loginInp" type="text" placeholder="Enter your username" autocomplete="off"/>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input id="loginPass" type="password" placeholder="Enter your password" />
        </div>

        <button id="loginSubmit" type="submit">Login</button>
      </form>

      <p class="signup-text">
        Don't have an account?
        <a href="/DOM/FinTech Pro/signUp.html">Sign Up</a>
      </p>
    </div>
    
    <script type="text/javascript">
    (function (l) {
      if (l.search[1] === "/") {
        var decoded = l.search
          .slice(1)
          .split("&")
          .map(function (s) {
            return s.replace(/~and~/g, "&");
          })
          .join("?");
        window.history.replaceState(
          null,
          null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    })(window.location);
  </script>
    <script src="authentication.js"></script>
  </body>
</html>
