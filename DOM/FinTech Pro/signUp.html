<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTrack Pro | Sign Up</title>

    <link rel="stylesheet" href="signup.css" />
  </head>
  <body>
    <div class="background-circle circle1"></div>
    <div class="background-circle circle2"></div>

    <div class="signup-container">
      <h1>Create Account</h1>

      <p class="subtitle">
        Join FinTrack Pro and start tracking your finances.
      </p>

      <form id="signUp">
        <div class="input-group">
          <label>Choose a Username</label>
          <input id="signInp" type="text" placeholder="Enter username" autocomplete="off"/>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input id="signPass" type="password" placeholder="Create password" />
        </div>

        <button type="submit">Register</button>
      </form>

      <p class="login-text">
        Already have an account?
        <a href="/DOM/FinTech Pro/login.html">Login</a>
      </p>
    </div>

    <script src="authentication.js"></script>
  </body>
</html>
