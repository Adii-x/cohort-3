<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porductivity Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Flow - Plan your day. Hit your goals. Stay in it.</h1>
      </header>

      <section id="container">
        <div id="dashboard">
          <div class="dashboard-top">
            <div class="timer"></div>
            <div class="weather"></div>
          </div>

          <div class="dashboard-btm">
            <div class="quote">
              <p><span id="quote-text"></span></p>
              <div class="author"><span id="quote-author"></span></div>
            </div>
          </div>
        </div>

        <div id="navigation">
          <div class="box" id="dashboard-btn">
            <i class="ri-dashboard-line"></i>
          </div>

          <div class="box" id="theme-btn">
            <i class="ri-moon-line"></i>
          </div>

          <div class="box" id="todo-btn">
            <i class="ri-todo-line"></i>
          </div>

          <div class="box" id="dailyPlanner-btn">
            <i class="ri-calendar-event-line"></i>
          </div>

          <div class="box" id="pomodoro-btn">
            <i class="ri-timer-line"></i>
          </div>

          <div class="box" id="dailyGoals-btn">
            <i class="ri-target-line"></i>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
