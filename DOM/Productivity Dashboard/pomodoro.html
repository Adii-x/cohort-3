<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="pomodoro.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <header>
        <h1>Flow - Plan your day. Hit your goals. Stay in it.</h1>
      </header>

      <section id="container">
        <div id="dashboard">
              <div class="pomodoro">
                <h2 class="pomodoro-title">POMODORO</h2>

                <div class="timer-circle">
                  <div id="timer-display">25:00</div>
                </div>

                <p id="session-type">Work Session</p>

                <div class="timer-controls">
                  <button id="start-btn">
                    <i class="ri-play-line"></i>
                    Start
                  </button>

                  <button id="pause-btn">
                    <i class="ri-pause-line"></i>
                    Pause
                  </button>

                  <button id="reset-btn">
                    <i class="ri-reset-left-line"></i>
                    Reset
                  </button>
                </div>

                <div class="duration-options">
                  <button class="duration-btn active" data-time="25">
                    25 Min
                  </button>

                  <button class="duration-btn" data-time="5">5 Min</button>

                  <button class="duration-btn" data-time="15">15 Min</button>
            </div>
          </div>
        </div>

        <div id="navigation">
          <div class="box" id="dashboard-btn">
            <i class="ri-dashboard-line"></i>
          </div>

          <div class="box" id="theme-btn">
            <i class="ri-moon-line"></i>
          </div>

          <div class="box" id="todo-btn">
            <i class="ri-todo-line"></i>
          </div>

          <div class="box" id="dailyPlanner-btn">
            <i class="ri-calendar-event-line"></i>
          </div>

          <div class="box" id="pomodoro-btn">
            <i class="ri-timer-line"></i>
          </div>

          <div class="box" id="dailyGoals-btn">
            <i class="ri-target-line"></i>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
    <script src="pomodoro.js"></script>
  </body>
</html>
