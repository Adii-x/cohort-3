<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="todo.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Flow - Plan your day. Hit your goals. Stay in it.</h1>
      </header>

      <section id="container">
        <div id="dashboard">
          <div class="todo-container">
            <div class="todo-header">
              <h2>Todo List</h2>

              <div class="todo-input">
                <input
                  type="text"
                  id="task-input"
                  placeholder="Add a new task..."
                />

                <button id="add-task">
                  <i class="ri-add-line"></i>
                  Add Task
                </button>
              </div>
            </div>

            <div class="todo-list-container">
              <ul id="todo-list">
                <!-- JS will create tasks here -->
                
              </ul>
            </div>
          </div>
        </div>

        <div id="navigation">
          <div class="box" id="dashboard-btn">
            <i class="ri-dashboard-line"></i>
          </div>

          <div class="box" id="theme-btn">
            <i class="ri-moon-line"></i>
          </div>

          <div class="box" id="todo-btn">
            <i class="ri-todo-line"></i>
          </div>

          <div class="box" id="dailyPlanner-btn">
            <i class="ri-calendar-event-line"></i>
          </div>

          <div class="box" id="pomodoro-btn">
            <i class="ri-timer-line"></i>
          </div>

          <div class="box" id="dailyGoals-btn">
            <i class="ri-target-line"></i>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
    <script src="todo.js"></script>
  </body>
</html>
