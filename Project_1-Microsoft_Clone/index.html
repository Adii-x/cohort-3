<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/732/732221.png" type="image/x-icon">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>
    <main>

        <nav class="navbar">
            <div class="nav-left">
                <img src="https://uhf.microsoft.com/images/microsoft/RE1Mu3b.png" alt="Microsoft Logo">
                <div class="nav-links">
                    <p>Microsoft 365</p>
                    <p>Azure</p>
                    <p>Copilot</p>
                    <p>Windows</p>
                    <p>Surface</p>
                    <p>Xbox</p>
                    <p>Support</p>
                </div>
            </div>
            <div class="nav-right">
                <p>All Microsoft <span><i class="ri-arrow-down-s-line"></i></span></p>
                <p>Search <span><i class="ri-search-line"></i></span></p>
                <p>Cart <span><i class="ri-shopping-cart-line"></i></span></p>
                <p>Sign in</p> 
                <div class="profile">
                    <img src="https://images.unsplash.com/photo-1759122840364-a67d08ff7138?q=80&w=1935&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="proflie picture">
                </div>   
            </div>
        </nav>

        <div class="sec1">
            <h1>Meet Surface Laptop</h1>
            <p>Unlock AI features like Live Captions and Cocreator with this <br>exceptionally powerful laptop.</p>
            <button>Learn more</button>
        </div>

        <div class="sec2">
            <div class="box">
                <img src="https://cdn-dynmedia-1.microsoft.com/is/content/microsoftcorp/Link-List-Icons-Microsoft-365?wid=40&hei=40" alt="Microsoft Logo">
                <span>Shop Microsoft 365</span>
            </div>
            <div class="box">
                <img src="https://cdn-dynmedia-1.microsoft.com/is/content/microsoftcorp/Link-List-Icons-Xbox-Games-Consoles?wid=40&hei=40" alt="Xbox Logo">
                <span>Shop Xbox</span>
            </div>
            <div class="box">
                <img src="https://cdn-dynmedia-1.microsoft.com/is/content/microsoftcorp/Link-List-Icons-Microsoft-365?wid=40&hei=40" alt="Microsoft Logo">
                <span>Get Windows 11</span>
            </div>
            <div class="box">
                <img src="https://cdn-dynmedia-1.microsoft.com/is/content/microsoftcorp/Link-List-Icons-Surface-Devices?wid=40&hei=40" alt="tablet Logo">
                <span>Shop Surface</span>
            </div>
        </div>

    </main>
</body>
</html>
