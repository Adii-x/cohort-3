<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SunMall</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <img src="./Assets/logo.png" alt="Logo" />
        </div>

        <div class="navLinks">
          <a href="#">HOME</a>
          <a href="#">ABOUT</a>
          <a href="#">CHIPS</a>
          <a href="#">SERVICES</a>
          <a href="#">CONTACT</a>
        </div>

        <div class="navSearch">
          <div class="search">
            <i class="ri-search-line"></i>
          </div>
          <div class="inpPlace">
            <input type="text" placeholder="Search for Chips...">
          </div>
          <div class="cart">
            <i class="ri-shopping-bag-fill"></i>
          </div>
        </div>
      </nav>
    </header>
  </body>
</html>
