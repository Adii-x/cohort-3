<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BUTUSIC</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <div class="lefttop box">
        <div class="image">
            <img src="./Assets/Image1.png" alt="Image1">
        </div>
        <div class="ad">
            <img src="./Assets/Image3.png" alt="Image3">
        </div>
      </div>

      <div class="nav box">
        <div class="top">
            <p><span><i class="ri-apps-2-line"></i></span>CATEGORIES</p>
            <p><span><i class="ri-wallet-line"></i></span>PAYMENT</p>
            <p><span><i class="ri-user-line"></i></span>AUTHORS</p>
            <p><span><i class="ri-brush-2-line"></i></span>AUCTION</p>
            <p><span><i class="ri-arrow-right-up-long-line"></i></span>SALES</p>
            <p><span><i class="ri-star-line"></i></span>REVIEWS</p>
        </div>
        <div class="btm">
            <p><span><i class="ri-mail-line"></i></span>CONTACTS</p>
        </div>
      </div>
      
      <div class="info box"></div>
      <div class="rightimg box"></div>
      <div class="rating box"></div>
      <div class="leftbtm box"></div>
      <div class="address box"></div>
      <div class="download box"></div>
      <div class="medals box"></div>
    </main>
  </body>
</html>
