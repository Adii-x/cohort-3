<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section id="left">
        <nav>
          <h4>Poadcast</h4>
          <h4>Portfolio</h4>
          <h4>Research</h4>
          <h4>Clients</h4>
        </nav>

        <div class="card">
          <div class="image">
            <div class="container">
              <img src="./Man.png" alt="Man" />
            </div>
          </div>

          <div class="content">
            <div class="left">
              <h2>
                <span>Im,</span><br />
                Jon <br />
                Daniel
              </h2>
              <p>
                Inquiry@jondaniel.design
                <span><i class="ri-inbox-2-line"></i></span>
              </p>
            </div>
          </div>
        </div>

        <div class="about">
          <h4>
            <span><i class="ri-shining-fill"></i></span>About Me
          </h4>
        </div>
      </section>

      <section id="right">
        <div class="heading box">
          <h1>Portfolio</h1>
        </div>

        <div class="video box">
          <div class="play">
            <i class="ri-play-fill"></i>
          </div>
          <img
            src="https://gratisography.com/wp-content/uploads/2023/06/gratisography-paper-flamingo-free-stock-photo-800x525.jpg"
            alt="flemingo"
          />
        </div>

        <div class="projects box">
          <div class="top">
            <h3>251 <br> <span>Projects</span></h3>
          </div>

          <div class="btm">
            <h3>156<br><span>Awards</span></h3></div>
        </div>

        <div class="clients box">
            <span><i class="ri-apple-fill"></i></span>
            <p>Clients</p>
        </div>

        <div class="awards box">

            <div class="aleft">
                <img src="https://ajxtechnologies.com/wp-content/uploads/2025/09/Untitled-design-7-e1759135213651.png" alt="Design">
            </div>

            <div class="aright">
                <h2>172 <br> <span>Global Design</span></h2>
                <p>Awards.</p>
            </div>

        </div>

      </section>
    </main>
  </body>
</html>
